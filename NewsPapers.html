<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Books</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }
    
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #1e2a38;
        padding: 15px 40px;
    }
    
    .logo {
        color: white;
        margin: 0;
        font-size: 50px;
    }
    
    nav {
        display: flex;
        flex-wrap: wrap;
    }
    
    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-size: 20px;
        padding: 10px;
        display: block;
        position: relative;
        z-index: 10;
    }
    
    nav a:hover {
        color: #00bcd4;
    }
    
    @media (max-width: 768px) {
        header {
            flex-direction: column;
            align-items: flex-start;
        }
    
        nav {
            width: 100%;
        }
    
        nav a {
            width: 100%;
            margin: 5px 0;
            text-align: left;
        }
    }
    
    .books {
        padding: 40px;
        text-align: center;
    }
    
    .book-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }
    
    .book-card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        transition: 0.3s;
    }
    
    .book-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
    
    .book-card button {
        padding: 8px 12px;
        border: none;
        background: #1e2a38;
        color: white;
        cursor: pointer;
    }
    
    .book-card button:hover {
        background: #00bcd4;
    }
    
    .book-card:hover {
        transform: scale(1.03);
    }
    </style>

</head>

<body>

<header>
    <h1 class="logo">Book Nest</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="Books.html">Books</a>
        <a href="NewsPapers.html">Newspapers</a>
        <a href="About.html">About</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<section class="books">
    <h2>NewsPapers Categories</h2>

    <div class="book-container">

        <div class="book-card">
            <img src="Dailynews.png" alt="">
            <h3>Daily Newspapers</h3>
            <p>“Read daily newspapers to stay updated with current events and breaking news.</p>
            <a href="Daily.html"><button>View Details</button></a>
        </div>

        <div class="book-card">
            <img src="weekly-news.jpg" alt="">
            <h3>Weekly Newspapers</h3>
            <p>Explore weekly newspapers for detailed stories, features, and analysis.</p>
            <a href="weekly.html"><button>View Details</button></a>
        </div>

    </div>
</section>

</body>
</html>
