<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Books</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }
    
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #1e2a38;
        padding: 15px 40px;
    }
    
    .logo {
        color: white;
        margin: 0;
        font-size: 50px;
    }
    
    nav {
        display: flex;
        flex-wrap: wrap;
    }
    
    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-size: 20px;
        padding: 10px;
        display: block;
        position: relative;
        z-index: 10;
    }
    
    nav a:hover {
        color: #00bcd4;
    }
    
    @media (max-width: 768px) {
        header {
            flex-direction: column;
            align-items: flex-start;
        }
    
        nav {
            width: 100%;
        }
    
        nav a {
            width: 100%;
            margin: 5px 0;
            text-align: left;
        }
    }
    
    p {
        font-size: 50px;
        font-weight: bold;
        text-align: center;
        text-decoration: underline;
        font-family: Chaparral Pro Light;
    }
    
    .books {
        padding: 40px;
        text-align: center;
    }
    
    .book-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }
    
    .book-card {
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        transition: 0.3s;
    }
    
    .book-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
    }
    
    .book-card:hover {
        transform: scale(1.02);
    }
    </style>
</head>

<body>

<header>
    <h1 class="logo">Book Nest</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="Books.html">Books</a>
        <a href="NewsPapers.html">Newspapers</a>
        <a href="About.html">About</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<p>“Welcome to  Daily Newspapers Section ”</p>

<section class="books">

    <div class="book-container">

        <div class="book-card">
            <img src="daily news newspaper.jpeg" alt="">
            <h3><u>Daily News</u></h3>
            <h4>English national newspaper</h4>
        </div>

        <div class="book-card">
            <img src="Dinamina.png" alt="">
            <h3><u>Dinamina</u></h3>
            <h4>Popular Sinhala daily news.</h4>
        </div>

        <div class="book-card">
            <img src="Lankadeepa.jpg" alt="">
            <h3><u>Lankadeepa</u></h3>
            <h4> Well-known local newspaper.</h4>
        </div>

        <div class="book-card">
            <img src="Divaina.jpg" alt="">
            <h3><u>Divaina</u></h3>
            <h4>Covers national news and features</h4>
        </div>

    </div>

</section>

</body>
</html>
