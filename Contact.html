<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - Book Nest</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }
    
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #1e2a38;
        padding: 15px 40px;
    }
    
    .logo {
        color: white;
        margin: 0;
        font-size: 40px;
    }
    
    nav {
        display: flex;
        flex-wrap: wrap;
    }
    
    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-size: 18px;
        padding: 10px;
        display: block;
        position: relative;
        z-index: 10;
    }
    
    nav a:hover {
        color: #00bcd4;
    }
    
    @media (max-width: 768px) {
        header {
            flex-direction: column;
            align-items: flex-start;
        }
    
        nav {
            width: 100%;
        }
    
        nav a {
            width: 100%;
            margin: 5px 0;
            text-align: left;
        }
    }
    
    .contact {
        padding: 50px;
        text-align: center;
    }
    
    .contact h2 {
        font-size: 32px;
        margin-bottom: 20px;
    }
    
    .contact form {
        max-width: 500px;
        margin: auto;
        display: flex;
        flex-direction: column;
    }
    
    .contact input,
    .contact textarea {
        margin-bottom: 15px;
        padding: 12px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
        width: 100%;
        box-sizing: border-box;
    }
    
    .contact button {
        padding: 12px;
        background-color: #1e2a38;
        color: white;
        border: none;
        font-size: 18px;
        cursor: pointer;
        border-radius: 5px;
    }
    
    .contact button:hover {
        background-color: #00bcd4;
    }
    </style>

</head>

<body>

<header>
    <h1 class="logo">Book Nest</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="Books.html">Books</a>
        <a href="NewsPapers.html">Newspapers</a>
        <a href="About.html">About</a>
        <a href="Contact.html">Contact</a>
    </nav>
</header>

<section class="contact">
    <h2>Contact Us</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

</body>
</html>
